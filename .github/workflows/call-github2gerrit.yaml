name: "GitHub2Gerrit"

# Thin caller for the github2gerrit reusable workflow.
#
# All orchestration logic lives in the reusable workflow; this file
# only declares triggers and forwards inputs/secrets.
#
# Trigger events:
#   - pull_request_target: mirrors pull requests to Gerrit
#   - push: closes GitHub PRs whose Gerrit changes have merged
#     (CLOSE_MERGED_PRS state reconciliation flow)
#   - workflow_dispatch: manual runs and Gerrit event dispatches
#     (gerrit_to_platform sends GERRIT_* inputs; change-merged and
#     change-abandoned events close the source GitHub PR)

# yamllint disable-line rule:truthy
on:
  # Submit new GitHub pull requests to Gerrit
  # When a pull request is modified, update the Gerrit change
  pull_request_target:
    types: [opened, reopened, edited, synchronize, closed]
    branches:
      - main
      - master

  # Gerrit merges replicate back to GitHub as pushes; this event
  # drives closure of GitHub PRs whose Gerrit change has merged
  push:
    branches:
      - main
      - master

  # Pushes from Gerrit use gerrit_to_platform triggers
  # These use the workflow_dispatch method/invocation
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: false
        type: string
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: false
        type: string
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: false
        type: string
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: false
        type: string
      GERRIT_EVENT_TYPE:
        description: "Gerrit event type"
        required: false
        type: string
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: false
        type: string
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: false
        type: string
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: false
        type: string
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: false
        type: string
      PR_NUMBER:
        description: "PR number to process; 0 processes all open PRs"
        required: false
        default: "0"
        type: string

permissions: {}

jobs:
  github2gerrit:
    name: "Call GitHub2Gerrit"
    permissions:
      contents: read
      pull-requests: write
      issues: write
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/github2gerrit-action/.github/workflows/github2gerrit.yaml@dac8641c5f3b82636157340c1915999a4c4d7ff7 # v1.4.3
    with:
      USE_PR_AS_COMMIT: true
      PRESERVE_GITHUB_PRS: true
      CLOSE_MERGED_PRS: true
      ISSUE_ID_LOOKUP_JSON: ${{ vars.ISSUE_ID_LOOKUP_JSON }}
      GERRIT_KNOWN_HOSTS: ${{ vars.GERRIT_KNOWN_HOSTS }}
      # Forward Gerrit event dispatch context (gerrit_to_platform)
      PR_NUMBER: ${{ inputs.PR_NUMBER || '0' }}
      GERRIT_CHANGE_URL: ${{ inputs.GERRIT_CHANGE_URL || '' }}
      GERRIT_EVENT_TYPE: ${{ inputs.GERRIT_EVENT_TYPE || '' }}
      GERRIT_BRANCH: ${{ inputs.GERRIT_BRANCH || '' }}
    secrets:
      GERRIT_SSH_PRIVKEY_G2G: ${{ secrets.GERRIT_SSH_PRIVKEY_G2G }}
