---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# =============================================================================
# Gerrit-wrapped caller for the reusable Go build-test workflow
# =============================================================================
# Gerrit is the source of truth (SCM) for this project. gerrit_to_platform
# dispatches this workflow (via the GitHub API) when a patchset is created in
# Gerrit; the wrapper jobs then vote Verified +/-1 on the change.
#
# DEPLOYMENT NOTES:
#   * The filename contains BOTH 'gerrit' AND 'verify' so gerrit_to_platform
#     can discover it.
#   * This workflow must exist on EVERY active branch: dispatches target
#     refs/heads/{GERRIT_BRANCH}.
#   * The nine GERRIT_* inputs are populated automatically by the dispatcher.
#   * GERRIT_DISABLED allows a manual run from the GitHub UI without Gerrit
#     (the clear/vote jobs are skipped and a normal checkout is used).
#   * Requires repository variables GERRIT_SERVER, GERRIT_SSH_USER,
#     GERRIT_KNOWN_HOSTS, GERRIT_URL and the secret GERRIT_SSH_PRIVKEY.
# =============================================================================
name: "Go build/test/audit"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: false
        type: string
        default: ""
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: false
        type: string
        default: ""
      GERRIT_EVENT_TYPE:
        description: "Type of Gerrit event"
        required: false
        type: string
        default: ""
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: false
        type: string
        default: ""
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: false
        type: string
        default: ""
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: false
        type: string
        default: ""
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: false
        type: string
        default: ""
      GERRIT_DISABLED:
        description: "Run without Gerrit components"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Clear any previous Verified vote so the change starts from a clean state.
  clear-vote:
    name: "Clear Verified vote"
    if: inputs.GERRIT_DISABLED != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Clear votes"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13 # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear
      - name: "Allow replication"
        run: sleep 10s

  # Call the reusable Go build-test workflow. When dispatched by Gerrit, the
  # gerrit_* inputs drive checkout-gerrit-change-action inside the reusable
  # workflow. For a manual GERRIT_DISABLED run the GERRIT_* inputs are empty,
  # so the reusable workflow performs a normal checkout.
  build-test:
    name: "Build and test"
    needs: clear-vote
    if: >-
      always()
      && (needs.clear-vote.result == 'success'
          || needs.clear-vote.result == 'skipped')
    permissions:
      contents: read
      pull-requests: read # repository-metadata-action queries PR data
    # yamllint disable-line rule:line-length
    uses: lfreleng-actions/go-workflows/.github/workflows/build-test.yaml@a1a9d4d574d6de4c71a7b05dfd1f15027e73b08a # v0.3.0
    with:
      # confluent-kafka-go/v2 requires cgo; build off unless enabled here.
      cgo_enabled: '1'
      # When GERRIT_DISABLED is true the gerrit_* values are blanked so the
      # reusable workflow falls back to a standard checkout.
      # yamllint disable-line rule:line-length
      gerrit_refspec: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_REFSPEC || '' }}
      # yamllint disable-line rule:line-length
      gerrit_project: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_PROJECT || '' }}
      # yamllint disable-line rule:line-length
      gerrit_branch: ${{ !inputs.GERRIT_DISABLED && inputs.GERRIT_BRANCH || '' }}
      # gerrit_url falls back to the GERRIT_URL repository variable.

  # Report the overall workflow conclusion back to Gerrit as a Verified vote.
  vote:
    name: "Report vote to Gerrit"
    if: ${{ always() && inputs.GERRIT_DISABLED != true }}
    needs: [clear-vote, build-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read # workflow-conclusion lists run jobs via the Actions API
    timeout-minutes: 5
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: "Get conclusion"
        # yamllint disable-line rule:line-length
        uses: im-open/workflow-conclusion@8eac7f17381a6917bc04fec3e2c92e70ebc37526 # v3.0.0
      - name: "Set vote"
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13 # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: ${{ env.WORKFLOW_CONCLUSION }}
